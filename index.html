  storageBucket: "amoromenu.firebasestorage.app",
  messagingSenderId: "812331615599",
  appId: "1:812331615599:web:679722c84af09ab9bb949a"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// =============================================
// Storage Manager (Firebase)
// =============================================

const Storage = {
  AUTH_KEY: 'amore_auth',
  SESSION_KEY: 'amore_session',
  _menuCache: null,

  getMenu() {
    return this._menuCache || DEFAULT_MENU_DATA;
  },

  async saveMenu(data) {
    try {
      await set(ref(db, 'menuData'), JSON.stringify(data));
    } catch(e) {
      console.error("Firebase saveMenu error:", e);
    }
  },

  listenToMenu(callback) {
    onValue(ref(db, 'menuData'), async (snapshot) => {
      if (snapshot.exists()) {
        try {
          const parsed = JSON.parse(snapshot.val());
          if (parsed && parsed.categories && parsed.categories.length > 0) {
            this._menuCache = parsed;
          } else {
            await this.saveMenu(DEFAULT_MENU_DATA);
            this._menuCache = DEFAULT_MENU_DATA;
          }
        } catch(e) {
          await this.saveMenu(DEFAULT_MENU_DATA);
          this._menuCache = DEFAULT_MENU_DATA;
        }
      } else {
        await this.saveMenu(DEFAULT_MENU_DATA);
        this._menuCache = DEFAULT_MENU_DATA;
      }
      if (callback) callback(this._menuCache);
    });
  },

  getAuth() {
    const stored = localStorage.getItem(this.AUTH_KEY);
    if (stored) { try { return JSON.parse(stored); } catch(e) {} }
    const defaultAuth = { username: 'admin', password: 'amore2024' };
    this.saveAuth(defaultAuth);
    return defaultAuth;
  },

  saveAuth(auth) { localStorage.setItem(this.AUTH_KEY, JSON.stringify(auth)); },

  setSession(val) {
    if (val) {
      sessionStorage.setItem(this.SESSION_KEY, 'true');
      localStorage.setItem(this.SESSION_KEY + '_persist', 'true');
    } else {
      sessionStorage.removeItem(this.SESSION_KEY);
      localStorage.removeItem(this.SESSION_KEY + '_persist');
    }
  },

  isLoggedIn() {
    return sessionStorage.getItem(this.SESSION_KEY) === 'true' ||
           localStorage.getItem(this.SESSION_KEY + '_persist') === 'true';
  },

  logout() { this.setSession(false); },
  generateId() { return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
};

    document.addEventListener("DOMContentLoaded", () => {
      // Set current year
      document.getElementById('current-year').textContent = new Date().getFullYear();

      // Core State
      let menuData = Storage.getMenu();
      let activeCategoryId = "all";
      let searchQuery = "";

      // Dom Elements
      const categoryTabsContainer = document.getElementById("category-tabs-container");
      const menuSectionsContainer = document.getElementById("menu-sections-container");
      const searchBar = document.getElementById("search-bar");
      
      // Modal Elements
      const detailModal = document.getElementById("detail-modal");
      const closeModalBtn = document.getElementById("close-modal-btn");
      const modalImg = document.getElementById("modal-img-element");
      const modalPrice = document.getElementById("modal-price-val");
      const modalTitleAr = document.getElementById("modal-title-ar-element");
      const modalTitleEn = document.getElementById("modal-title-en-element");
      const modalDesc = document.getElementById("modal-desc-element");

      // Social Links
      const instagramLink = document.getElementById("instagram-link");
      const facebookLink = document.getElementById("facebook-link");

      // Initialize UI
      function initApp() {
        menuData = Storage.getMenu();
        
        // Render Restaurant profile
        document.title = `${menuData.restaurant.nameAr || 'Amore Cioccolato'} - القائمة الإلكترونية`;
        
        // Update Socials
        instagramLink.href = `https://instagram.com/${menuData.restaurant.instagram || 'amore.cioccolato'}`;
        facebookLink.href = `https://facebook.com/${menuData.restaurant.facebook || 'amore.cioccolato'}`;

        renderBranches();
        renderCategoryTabs();
        renderMenuGrid();
      }

      // Render Branches list
      function renderBranches() {
        const branchesContainer = document.getElementById("branches-list-container");
        branchesContainer.innerHTML = "";
        
        const branchesText = menuData.restaurant.branches || "";
        const branches = branchesText.split("/").map(b => b.trim()).filter(b => b.length > 0);
        
        branches.forEach(branch => {
          const tag = document.createElement("span");
          tag.className = "branch-tag";
          tag.textContent = branch;
          branchesContainer.appendChild(tag);
        });
      }

      // Render Category Filter Buttons
      function renderCategoryTabs() {
        categoryTabsContainer.innerHTML = "";

        // Add 'All' Tab
        const allBtn = document.createElement("button");
        allBtn.className = `category-tab-btn ${activeCategoryId === "all" ? "active" : ""}`;
        allBtn.innerHTML = `<i class="fa-solid fa-list"></i> <span>الكل</span>`;
        allBtn.addEventListener("click", () => {
          activeCategoryId = "all";
          updateCategoryTabsActiveState();
          renderMenuGrid();
        });
        categoryTabsContainer.appendChild(allBtn);

        // Add each category from storage
        menuData.categories.forEach(cat => {
          const btn = document.createElement("button");
          btn.className = `category-tab-btn ${activeCategoryId === cat.id ? "active" : ""}`;
          btn.innerHTML = `<span class="cat-icon">${cat.icon || '🥤'}</span> <span>${cat.nameAr || cat.name}</span>`;
          btn.addEventListener("click", () => {
            activeCategoryId = cat.id;
            updateCategoryTabsActiveState();
            renderMenuGrid();
          });
          categoryTabsContainer.appendChild(btn);
        });
      }

      // Update active styling of category tabs
      function updateCategoryTabsActiveState() {
        const buttons = categoryTabsContainer.querySelectorAll(".category-tab-btn");
        buttons.forEach((btn, idx) => {
          if (idx === 0) {
            // 'All' button
            btn.classList.toggle("active", activeCategoryId === "all");
          } else {
            const cat = menuData.categories[idx - 1];
            btn.classList.toggle("active", activeCategoryId === cat.id);
          }
        });
      }

      // Render products grid
      function renderMenuGrid() {
        menuSectionsContainer.innerHTML = "";

        // Determine which categories to render
        const targetCategories = activeCategoryId === "all" 
          ? menuData.categories 
          : menuData.categories.filter(c => c.id === activeCategoryId);

        let itemsRenderedCount = 0;

        targetCategories.forEach(cat => {
          // Filter items based on search query
          const filteredItems = cat.items.filter(item => {
            const query = searchQuery.toLowerCase().trim();
            if (!query) return true;
            return item.name.toLowerCase().includes(query) || 
                   item.nameEn.toLowerCase().includes(query) ||
                   (item.description && item.description.toLowerCase().includes(query));
          });

          if (filteredItems.length === 0) return; // Skip empty categories on search

          itemsRenderedCount += filteredItems.length;

          // Category group container
          const catGroup = document.createElement("div");
          catGroup.className = "category-group animate-fade";

          // Title
          const titleEl = document.createElement("h2");
          titleEl.className = "category-title";
          titleEl.innerHTML = `<span class="cat-icon">${cat.icon || '🥤'}</span> <span>${cat.nameAr || cat.name}</span>`;
          catGroup.appendChild(titleEl);

          // Grid
          const gridEl = document.createElement("div");
          gridEl.className = "items-grid";

          // Cards
          filteredItems.forEach(item => {
            const cardEl = document.createElement("div");
            cardEl.className = "item-card";
            
            // Format price with comma
            const formattedPrice = Number(item.price).toLocaleString();
            
            // Image fallbacks: if image is null, show a beautiful red/black gradient
            const imgUrl = item.image || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111111'/><circle cx='50' cy='50' r='30' fill='%23E63946' opacity='0.15'/></svg>";

            cardEl.innerHTML = `
              <div class="card-img-wrapper">
                <div class="price-badge">
                  <span>${formattedPrice}</span>
                  <span class="price-currency">د.ع</span>
                </div>
                <img src="${imgUrl}" alt="${item.name}" class="card-img" loading="lazy">
              </div>
              <div class="card-body">
                <h3 class="card-title-ar">${item.name}</h3>
                <h4 class="card-title-en font-en">${item.nameEn}</h4>
                <p class="card-desc">${item.description || 'تذوق طعم الانتعاش والأصالة المحضر من أفضل المكونات الطازجة.'}</p>
                <div class="card-action">
                  <span>عرض التفاصيل</span>
                  <i class="fa-solid fa-chevron-left"></i>
                </div>
              </div>
            `;

            // Click listener for details modal
            cardEl.addEventListener("click", () => {
              openDetailModal(item);
            });

            gridEl.appendChild(cardEl);
          });

          catGroup.appendChild(gridEl);
          menuSectionsContainer.appendChild(catGroup);
        });

        // Show empty state if no items
        if (itemsRenderedCount === 0) {
          const emptyState = document.createElement("div");
          emptyState.className = "animate-fade";
          emptyState.style.textAlign = "center";
          emptyState.style.padding = "60px 20px";
          emptyState.innerHTML = `
            <i class="fa-solid fa-mug-hot" style="font-size: 3rem; color: var(--red); opacity: 0.5; margin-bottom: 15px;"></i>
            <h3 style="font-size: 1.2rem; font-weight: 700;">عذراً، لم نجد أي نتائج تطابق بحثك</h3>
            <p style="color: var(--white-dim); font-size: 0.85rem; margin-top: 5px;">يرجى تجربة البحث عن كلمة أخرى أو مراجعة الحروف.</p>
          `;
          menuSectionsContainer.appendChild(emptyState);
        }
      }

      // Open Modal Details
      function openDetailModal(item) {
        modalImg.src = item.image || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111111'/></svg>";
        modalImg.alt = item.name;
        modalPrice.textContent = Number(item.price).toLocaleString();
        modalTitleAr.textContent = item.name;
        modalTitleEn.textContent = item.nameEn;
        modalDesc.textContent = item.description || "مشروب رائع محضر بجودة فائقة ونكهة أصلية مميزة ومصنوع بكل حب لتجربة استثنائية منعشة لا تُنسى.";

        detailModal.classList.add("active");
        document.body.style.overflow = "hidden"; // Disable scroll behind modal
      }

      // Close Modal Details
      function closeDetailModal() {
        detailModal.classList.remove("active");
        document.body.style.overflow = ""; // Re-enable scroll
      }

      // Close events
      closeModalBtn.addEventListener("click", closeDetailModal);
      detailModal.addEventListener("click", (e) => {
        if (e.target === detailModal) {
          closeDetailModal();
        }
      });

      // Search Bar Key Event (Live filtering with debouncing vibe)
      searchBar.addEventListener("input", (e) => {
        searchQuery = e.target.value;
        renderMenuGrid();
      });

      // --- Smooth Horizontal Scrolling for Categories Tab ---
      function setupCategoryScroll() {
        const slider = categoryTabsContainer;
        let isDown = false;
        let startX;
        let scrollLeft;

        // A. Mouse Drag-to-Scroll
        slider.addEventListener('mousedown', (e) => {
          isDown = true;
          slider.classList.add('active-drag');
          startX = e.pageX - slider.offsetLeft;
          scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => {
          isDown = false;
          slider.classList.remove('active-drag');
        });
        slider.addEventListener('mouseup', () => {
          isDown = false;
          slider.classList.remove('active-drag');
        });
        slider.addEventListener('mousemove', (e) => {
          if(!isDown) return;
          e.preventDefault();
          const x = e.pageX - slider.offsetLeft;
          const walk = (x - startX) * 1.8; // Speed multiplier
          slider.scrollLeft = scrollLeft - walk;
        });

        // B. Translate Mouse Wheel vertical scroll to horizontal scroll
        slider.addEventListener('wheel', (e) => {
          e.preventDefault();
          slider.scrollLeft += e.deltaY;
        }, { passive: false });
      }

      // Run App - استمع للتغييرات الفورية من Firebase
      setupCategoryScroll();
      Storage.listenToMenu(() => {
        initApp();
      });
    });
  </script>
</body>
</html>
